[keyboard]

enter=["switch", "s_start"]
v=["switch", "s_left_flipper"]
z=["switch", "s_right_flipper"]
1=["switch", "s_left_orbit_made"]
2=["switch", "s_right_orbit_made"]
3=["switch", "s_left_ramp_made"]
4=["switch", "s_right_ramp_made"]
5=["switch", "s_center_vuk"]
o=["switch", "s_spinner"]
q=["switch", "s_soul_s"]
w=["switch", "s_soul_o"]
e=["switch", "s_soul_u"]
r=["switch", "s_soul_l"]
a=["switch", "s_glo_g"]
s=["switch", "s_glo_l"]
d=["switch", "s_glo_o"]
f=["switch", "s_mcdowell_inline_1"]
g=["switch", "s_mcdowell_inline_2"]
h=["switch", "s_mcdowell_inline_3"]
comma=["switch", "s_left_inlane"]
period=["switch", "s_right_inlane"]
p=["switch", "s_upper_pop"]
x=["switch", "s_trough_3", "toggle"]
up=["event", "sw_service_up_active"]
down=["event", "sw_service_down_active"]
left=["event", "sw_service_esc_active"]
right=["event", "sw_service_enter_active"]

[sound_system]

music={
"type": "solo"
}
effects={
"default": true,
"simultaneous_sounds": 3,
"type": "simultaneous"
}
voice={
"type": "sequential"
}

[gmc]

fullscreen=true
exit_on_esc=true
logging_global=20
logging_bcp=0
logging_game=0
logging_process=0
logging_sound_player=0
logging_media=0
logging_server=0

[mpf]

virtual=true
verbose=true

# Set to true to launch MPF with GMC
spawn_mpf=true

# Path to your MPF executable
executable_path="tools/run_mpf.sh"

# Arguments to launch MPF with the virtual platform and text console
mpf_args="-x"




