#config_version=6

# Dual display: backbox (1920x1080) + playfield ultrawide (2560x720)
# Display names MUST match MPFDisplay node names in slides/window.tscn

displays:
  backbox:
    width: 1920
    height: 1080
    default: true
  playfield:
    width: 2560
    height: 720

window:
  title: CTA Pinball
  resizable: false
