#config_version=6

## MPF Main Machine Config — entry point
#
# This is the thin entry shim. It loads the hardware-independent core
# (_config_core.yaml) then layers on the platform and machine settings.
# To run on different hardware, create a parallel shim (e.g.
# config_virtual.yaml) that loads the same core with a different platform.

config:
  - _config_core.yaml

# FAST NET hardware (Neuron + Cabinet I/O + IO-3208 + IO-1616 + IO-0804)
hardware:
  platform: fast

fast:
  net:
    controller: neuron
    port: auto # <-- Windows: COM5, etc. Set your real port.
    baud: 921600
    io_loop:
      cab: { model: FP-I/O-0024, order: 1 } # Cabinet I/O board
      pf_lower: { model: FP-I/O-3208, order: 2 } # Lower playfield
      pf_upper: { model: FP-I/O-1616, order: 3 } # Upper playfield
      aux: { model: FP-I/O-0804, order: 4 } # Aux node

# Flippers (dual-wound example; change to single-wound if needed)
flippers:
  left_flipper:
    main_coil: c_left_flipper_main
    hold_coil: c_left_flipper_hold
    activation_switch: s_left_flipper
    eos_switch: s_left_eos
    use_eos: true
    enable_events: ball_started
    disable_events: ball_will_end

  right_flipper:
    main_coil: c_right_flipper_main
    hold_coil: c_right_flipper_hold
    activation_switch: s_right_flipper
    eos_switch: s_right_eos
    use_eos: true
    enable_events: ball_started
    disable_events: ball_will_end

playfields:
  playfield:
    tags: default
    default_source_device: bd_trough

machine:
  balls_installed: 6
  min_balls: 1

game:
  balls_per_game: 3
  max_players: 4

ball_saves:
  default_ball_save:
    active_time: 10s
    hurry_up_time: 3s
    grace_period: 2s
    enable_events: ball_started
    disable_events: ball_will_end
    auto_launch: true
    balls_to_save: 1

# Enable Credits mode with permanent free play
credits:
  enabled: true
  free_play: true
  free_play_string: "FREE PLAY"

# Global shot profiles used by modes
shot_profiles:
  single_hit:
    advance_on_hit: true
    states:
      - name: ready
      - name: complete
