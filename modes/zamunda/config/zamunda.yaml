#config_version=6

# Zamunda hub that auto-starts 'The Prince Awakens'.
mode:
  start_events: start_mode_zamunda
  priority: 200
  stop_events: stop_mode_zamunda

event_player:
  mode_zamunda_started:
    - start_mode_the_prince_awakens{current_player.zamunda_modes_complete==0}
    - start_mode_bubble_bath{current_player.zamunda_modes_complete==1}
    - start_mode_sparring_with_semmi{current_player.zamunda_modes_complete==2}
    - start_mode_the_royal_wedding{current_player.zamunda_modes_complete==3}
    - start_mode_a_royal_celebration{current_player.zamunda_modes_complete==4}

slide_player:
  mode_zamunda_started:
    zamunda:
      priority: 200
    pf_zamunda:
      target: playfield
      priority: 200

widget_player:
  mode_zamunda_started:
    pf_mode_hud:
      target: playfield
      slide: pf_zamunda

sound_player:
  mode_zamunda_started:
    the-royal-penis-is-clean-your-highness-royal-penis-bathing-sponge-bath-servants-101soundboards:
      bus: music
      fade_in: 1s
  mode_zamunda_will_stop:
    the-royal-penis-is-clean-your-highness-royal-penis-bathing-sponge-bath-servants-101soundboards:
      action: stop
      fade_out: 500ms

light_player:
  mode_zamunda_started:
    l_zamunda:
      color: gold
      priority: 200
  mode_zamunda_will_stop:
    l_zamunda:
      color: "off"
