#config_version=6

# modes/location_select/config/location_select.yaml
# Base mode starts on game start, shows a blocking location chooser,
# and launches either Queens or Zamunda based on selection.

mode:
  start_events: start_mode_location_select
  stop_events: stop_mode_location_select
  priority: 500

event_player:
  # Set the initial location depending on the settings value
  mode_location_select_started.2:
    - set_location_queens{settings.starting_location=="queens" or settings.starting_location=="player_select"}
    - set_location_zamunda{settings.starting_location=="zamunda"}
    - set_location_random{settings.starting_location=="random"}
  # If the location is set and player_select is inactive, immediately finish the mode
  player_selected_location{settings.starting_location!="player_select"}:
    - location_choice_done
  # Use the *inactive* event to prevent accidental changes
  # during the both-flippers-to-select presses
  s_left_flipper_inactive: set_location_queens
  s_right_flipper_inactive: set_location_zamunda
  flipper_cancel: location_choice_done

  # When a location choice is made, start the corresponding mode
  # This is priority 2 (higher) so it happens before the mode stop
  location_choice_done.2:
    - start_mode_queens{current_player.selected_location == 1}
    - start_mode_zamunda{current_player.selected_location == 2}
  # When a location choice is made, end the location select mode
  # This is priority 1 (lower) so the queens/zamunda mode is started first
  location_choice_done.1:
    - stop_mode_location_select

random_event_player:
  set_location_random:
    events:
      - set_location_queens
      - set_location_zamunda

# Display + audio
slide_player:
  # Only show the location select slide if player_select is enabled
  mode_location_select_started{settings.starting_location=="player_select"}: location_choice      # slides/location_choice.tscn (extends MPFSlide)
  # When the selected value changes, update the slide
  player_selected_location{settings.starting_location=="player_select"}:
    location_choice:
      action: update

sound_player:
  mode_location_select_started{settings.starting_location=="player_select"}:
    01_Opening Title Music-WAV:
      bus: music
  location_choice_done:
    01_Opening Title Music-WAV:
      action: stop

# Selection state + defaults (1 = queens, 2 = zamunda)

variable_player:
  set_location_queens:
    selected_location:
      action: set
      int: 1
  set_location_zamunda:
    selected_location:
      action: set
      int: 2
