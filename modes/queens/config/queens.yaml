#config_version=6

# Queens hub that auto-starts your first Queens sub-mode
mode:
  start_events: start_mode_queens
  priority: 200
  stop_events: stop_mode_queens

event_player:
  mode_queens_started:
    - start_mode_arriving_in_queens{current_player.queens_modes_complete==0}
    - start_mode_searching_for_a_queen{current_player.queens_modes_complete==1}
    - start_mode_the_barbershop{current_player.queens_modes_complete==2}
    - start_mode_miss_black_awareness{current_player.queens_modes_complete==3}
    - start_mode_working_at_mcdowells{current_player.queens_modes_complete==4}
    - start_mode_basketball_date{current_player.queens_modes_complete==5}
    - start_mode_thwarting_a_robbery{current_player.queens_modes_complete==6}
    - start_mode_would_you_like_to_dance{current_player.queens_modes_complete==7}
    - start_mode_pleading_your_case{current_player.queens_modes_complete==8}
    - start_mode_king_collects_son{current_player.queens_modes_complete==9}

slide_player:
  mode_queens_started: queens